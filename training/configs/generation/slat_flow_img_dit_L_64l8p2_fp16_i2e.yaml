models:
  denoiser:
    name: ElasticSLatFlowModel
    args:
      resolution: 64
      in_channels: 8
      out_channels: 8
      model_channels: 1024
      cond_channels: 1024
      num_blocks: 24
      num_heads: 16
      mlp_ratio: 4
      patch_size: 2
      num_io_res_blocks: 2
      io_block_channels: [128]
      pe_mode: ape
      qk_rms_norm: true
      use_fp16: true

dataset:
  name: SLatI2E
  args:
    meta_csv: data_csvs/train_shade_slat_to_even_slat_gt.csv
    max_num_voxels: 32768
    image_size: 518
    normalization:
      mean:  
        - -2.1687545776367188
        - -0.004347046371549368
        - -0.13352349400520325
        - -0.08418072760105133
        - -0.5271206498146057
        - 0.7238689064979553
        - -1.1414450407028198
        - 1.2039363384246826
      std:
        - 2.377650737762451
        - 2.386378288269043
        - 2.124418020248413
        - 2.1748552322387695
        - 2.663944721221924
        - 2.371192216873169
        - 2.6217446327209473
        - 2.684523105621338
    pretrained_slat_dec: checkpoints/ckpts/slat_dec_gs_swin8_B_64l8gs32_fp16

trainer:
  name: ImageConditionedSparseFlowMatchingCFGTrainer
  args:
    max_steps: 1000000
    batch_size_per_gpu: 8
    batch_split: 2
    optimizer:
      name: AdamW
      args:
        lr: 0.00005
        weight_decay: 0.0
    lr_scheduler:
      name: LinearWarmupStepLRScheduler
      args:
        warmup_steps: 10000
        milestone_steps:
          - 80000
          - 160000
          - 240000
          - 320000
    ema_rate: [0.9999]
    fp16_mode: inflat_all
    fp16_scale_growth: 0.001
    elastic:
      name: LinearMemoryController
      args:
        target_ratio: 0.75
        max_mem_ratio_start: 0.5
    grad_clip:
      name: AdaptiveGradClipper
      args:
        max_norm: 1.0
        clip_percentile: 95
    i_log: 50
    i_sample: 1000
    i_save: 10000
    p_uncond: 0.1
    t_schedule:
      name: logitNormal
      args:
        mean: 1.0
        std: 1.0
    sigma_min: 0.00001
    image_cond_model: dinov2_vitl14_reg